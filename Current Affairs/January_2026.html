<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>January 2026</title>
<link rel="stylesheet" href="../style.css">

<style>

/* Only for this page */

.ir-content ul {
    padding-left: 55px;
}

.ir-content li {
    margin-bottom: 8px;
    line-height: 1.7;
}

h2 {
    color:#c0392b;
    margin-top:30px;
}



/* Accordion */

.accordion {
  background:#0c4b8a;
  color:white;
  cursor:pointer;
  padding:16px;
  width:100%;
  border:none;
  text-align:left;
  font-size:18px;
  margin-top:10px;
  border-radius:6px;
}

.accordion:hover {
  background:#1a5fd1;
}

.panel {
  background:white;
  max-height:0;
  overflow:hidden;
  transition:max-height .35s ease;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.panel-content {
  padding:18px;
  line-height:1.6;
}

.panel-content h3 {
  margin-top:12px;
  color:#c0392b;
}

ul {
    margin:6px 0 12px 25px;
}

/* Topic Box */

.topic-box{
    background:#f7f9fc;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    margin-bottom:20px;
}

/* Back Button */

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:white;
    background:#0c4b8a;
    padding:8px 14px;
    border-radius:6px;
}

.back-btn:hover{
    background:#1a5fd1;
}
/* Fix accordion link colors */
.accordion a,
.accordion a:link,
.accordion a:visited,
.accordion a:hover,
.accordion a:active {
    color: #ffffff;
    text-decoration: none;
    font-weight: 600;
    display: block;
    width: 100%;
}
</style>

</head>

<body>

<header>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">JA</div>
      <div class="logo-text">
        <h1>January 2026</h1>
        <p class="tagline">TGPSC General Studies</p>
      </div>
    </div>
  </div>
</header>


<main class="container">



<div class="content-card ir-content">

<!-- SECTION 1 -->
<button class="accordion"><a href="https://tgpscnotes.com/Current Affairs/Regional_January 2026"><strong>Regional</strong></a></button>




<!-- SECTION 2 -->
<button class="accordion"><a href="https://tgpscnotes.com/Current Affairs/National_January 2026"><strong>National</strong></a></button>


<!-- SECTION 3 -->
<button class="accordion"><a href="https://tgpscnotes.com/Current Affairs/International_January 2026"><strong>International</strong></a></button>
</div>
</main>
<!-- Accordion Script -->

<script>
document.querySelectorAll(".accordion").forEach(btn => {
  btn.addEventListener("click", function () {
    this.classList.toggle("active");
    const panel = this.nextElementSibling;

    if (panel.style.maxHeight) {
      panel.style.maxHeight = null;
    } else {
      panel.style.maxHeight = panel.scrollHeight + "px";
    }
  });
});
</script>

</body>
</html>
